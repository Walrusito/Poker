version: "3.9"

services:
  poker-ai:
    build: .
    container_name: poker_cfr_optimized
    volumes:
      - ./mlruns:/app/mlruns
    working_dir: /app
    # Defaults optimizados para Ryzen 7 5800X + RTX 3060 12 GB
    command: [
      "--iterations", "50",
      "--episodes", "200",
      "--eval-hands", "500",
      "--batch-size", "512"
    ]
    environment:
      - MLFLOW_TRACKING_URI=file:/app/mlruns
      - PYTHONUNBUFFERED=1
      - TORCH_BACKENDS_CUDNN_BENCHMARK=1
      - OMP_NUM_THREADS=8
    # ── GPU passthrough (requiere nvidia-container-toolkit) ──────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: on-failure

  mlflow-ui:
    image: python:3.11-slim
    container_name: poker_mlflow_ui
    working_dir: /app
    volumes:
      - ./mlruns:/app/mlruns
    ports:
      - "5000:5000"
    command: >
      sh -c "pip install mlflow --quiet &&
             mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri file:/app/mlruns"
    depends_on:
      - poker-ai
